<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온라인 허니문 플래너</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        signInWithCustomToken,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        setLogLevel,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
      window.firebase = {
        initializeApp,
        getAuth,
        signInAnonymously,
        signInWithCustomToken,
        getFirestore,
        setLogLevel,
      };

      // Load destination itineraries from external JSON and merge into window.firebase
      (async () => {
        try {
          const res = await fetch("data/itineraries.json");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          // Keep firebase helper object intact; store loaded itineraries
          // in a dedicated runtime variable so the app can reliably
          // prefer external JSON updates over embedded defaults.
          window.tripDurations = data;
          // mark loaded and notify listeners
          window.__itineraries_loaded = true;
          window.dispatchEvent(new Event("itineraries:loaded"));
        } catch (err) {
          console.error("Failed to load itineraries.json", err);
        }
      })();

      // Load destinations metadata from external JSON and populate `destinationsData`
      (async () => {
        try {
          // try normalized data first, then fallback to original destinations.json
          const candidateUrls = [
            "data/destinations.normalized.json",
            "data/destinations.json",
          ];
          let dests = null;
          for (const u of candidateUrls) {
            try {
              const r = await fetch(u);
              if (r.ok) {
                dests = await r.json();
                break;
              }
            } catch (e) {
              // try next
            }
          }
          if (!dests) throw new Error("Failed to load destinations JSON");
          // ensure a runtime global `destinationsData` exists
          try {
            if (typeof destinationsData === "undefined")
              window.destinationsData = [];
          } catch (e) {
            window.destinationsData = [];
          }
          // replace or assign
          window.destinationsData = dests;
          window.__destinations_loaded = true;
          window.dispatchEvent(new Event("destinations:loaded"));
        } catch (err) {
          console.error("Failed to load destinations.json", err);
        }
      })();

      // Load flight time mapping from external JSON and populate `flightTimes`
      (async () => {
        try {
          const res = await fetch("data/flight-times.json");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const ft = await res.json();
          try {
            if (typeof flightTimes === "undefined") window.flightTimes = {};
          } catch (e) {
            window.flightTimes = {};
          }
          window.flightTimes = ft;
          window.__flighttimes_loaded = true;
          window.dispatchEvent(new Event("flighttimes:loaded"));
        } catch (err) {
          console.error("Failed to load flight-times.json", err);
        }
      })();
    </script>
    <link rel="stylesheet" href="assets/style/styles.css" />
  </head>
  <body id="root"></body>
</html>

<script>
  // flightTimes is loaded at runtime from `data/flight-times.json`
  var flightTimes = window.flightTimes || {};
  // 여행지 데이터는 별도 JSON 파일 `data/destinations.json`로 분리되었습니다.
  // 런타임에서 로드되며, 전역 `destinationsData` 변수로 바인딩됩니다.
  // (실제 바인딩은 상단 스크립트에서 `window.destinationsData`로 설정됩니다)

  // 색상 팔레트: 주요 UI 색상 값 정의
  const colors = {
    primary: "#F46565", // 주요 색상
    secondary: "#FFFFFF", // 보조 색상
    background: "#FEECEC", // 배경 색상
    text: "#1F2023", // 텍스트 색상
    danger: "#F13E3E", // 경고/위험 색상
    accent: "#FB8C00", // 강조 색상
    good: "#09C26A", // GOOD 시즌 색상
    info: "#949DAF", // 정보 색상
  };

  // 국가명을 ISO 국가코드로 변환하는 함수
  function getCountryCode(country) {
    // 국가명-코드 매핑 객체
    const codes = {
      인도네시아: "id",
      태국: "th",
      베트남: "vn",
      일본: "jp",
      필리핀: "ph",
      말레이시아: "my",
      중국: "cn",
      몽골: "mn",
      네팔: "np",
      아랍에미리트: "ae",
      튀르키예: "tr",
      몰디브: "mv",
      싱가포르: "sg",
      호주: "au",
      "프렌치 폴리네시아": "pf",
      뉴질랜드: "nz",
      피지: "fj",
      뉴칼레도니아: "nc",
      바누아투: "vu",
      사모아: "ws",
      프랑스: "fr",
      이탈리아: "it",
      스위스: "ch",
      오스트리아: "at",
      스페인: "es",
      포르투갈: "pt",
      독일: "de",
      노르웨이: "no",
      핀란드: "fi",
      스웨덴: "se",
      그리스: "gr",
      영국: "gb",
      체코: "cz",
      크로아티아: "hr",
      슬로베니아: "si",
      덴마크: "dk",
      헝가리: "hu",
      폴란드: "pl",
      미국: "us",
      캐나다: "ca",
      멕시코: "mx",
      코스타리카: "cr",
      쿠바: "cu",
      칠레: "cl",
      페루: "pe",
      볼리비아: "bo",
      바하마: "bs",
      브라질: "br",
      아르헨티나: "ar",
      탄자니아: "tz",
      케냐: "ke",
      모로코: "ma",
      이집트: "eg",
      모리셔스: "mu",
      세이셸: "sc",
    };
    return codes[country] || "un";
  }

  // 예산 문자열을 카테고리(낮음/중간/높음/매우 높음)로 변환하는 함수
  function parseBudgetCategory(budgetStr) {
    if (!budgetStr || typeof budgetStr !== "string") return null;
    if (budgetStr.includes("매우")) return "매우 높음";
    if (budgetStr.includes("높음")) return "높음";
    if (budgetStr.includes("중간")) return "중간";
    if (budgetStr.includes("낮음") || budgetStr.includes("~500")) return "낮음";
    // 숫자 기반 예산 추정 (예: "500만원")
    const m = budgetStr.match(/(\d+)만원/);
    if (m) {
      const v = parseInt(m[1], 10);
      if (v <= 500) return "낮음";
      if (v <= 800) return "중간";
      if (v <= 1200) return "높음";
      return "매우 높음";
    }
    return null;
  }

  // 비행시간 문자열을 분(minutes)으로 변환하는 헬퍼 함수
  function parseFlightTimeToMinutes(flightTimeStr) {
    if (!flightTimeStr || typeof flightTimeStr !== "string") return 0;
    // 예: "10시간 30분" -> 630, "14시간" -> 840, "3시간 15분" -> 195
    let totalMinutes = 0;
    const hourMatch = flightTimeStr.match(/(\d+)\s*시간/);
    const minuteMatch = flightTimeStr.match(/(\d+)\s*분/);
    if (hourMatch) totalMinutes += parseInt(hourMatch[1], 10) * 60;
    if (minuteMatch) totalMinutes += parseInt(minuteMatch[1], 10);
    return totalMinutes;
  }

  // 비행시간(분)을 카테고리로 변환하는 함수
  // 단거리: 4시간 이하 (<=240분), 중거리: 4~7시간 (240~420분),
  // 장거리: 7~12시간 (420~720분), 울트라 장거리: 12시간 초과 (>720분)
  function parseFlightTimeCategory(flightTimeStr) {
    const minutes = parseFlightTimeToMinutes(flightTimeStr);
    if (minutes <= 240) return "단거리";
    if (minutes <= 420) return "중거리";
    if (minutes <= 720) return "장거리";
    return "울트라 장거리";
  }

  // 모든 여행지에 예산 카테고리와 비행시간 카테고리 미리 계산하여 추가
  // Compute derived fields (budgetCategory, flightTimeCategory, notes)
  function computeDerivedData() {
    try {
      const dests = window.destinationsData || destinationsData || [];
      const fTimes = window.flightTimes || flightTimes || {};
      if (!Array.isArray(dests)) return;
      dests.forEach((dest) => {
        dest.budgetCategory = parseBudgetCategory(dest.budget);
        const flightTime = fTimes[dest.country] || dest.flightTimeHours || null;
        dest.flightTimeCategory = flightTime
          ? parseFlightTimeCategory(flightTime)
          : dest.flightTimeCategory || null;
        // generate short note if not provided or overly long
        try {
          if (!dest.note || dest.note.length > 120)
            dest.note = generateNoteFor(dest);
        } catch (e) {}
      });
    } catch (e) {
      console.warn("computeDerivedData failed:", e);
    }
  }

  // 자동 생성 노트: note 필드를 일괄적으로 갱신하지 않고도
  // 일관된 톤의 1~2문장 노트를 제공하도록 런타임에서 생성합니다.
  function generateNoteFor(dest) {
    try {
      // 이미 명시적 note가 있고 길이가 짧으면 우선 사용
      if (dest.note && dest.note.length > 0 && dest.note.length <= 120)
        return dest.note;
      const vibe = dest.vibe ? dest.vibe.replace(/\s+/g, " ") : "여행지";
      const type = dest.travelType ? dest.travelType : "휴양/관광";
      const season =
        dest.bestMonths && dest.bestMonths.length
          ? `${dest.bestMonths[0]}월~${
              dest.bestMonths[dest.bestMonths.length - 1]
            }월`
          : "연중";
      // 최대 두 문장: 분위기 소개 + 추천 시즌/활동
      return `${dest.name}은 ${vibe}로 유명하며 ${type}에 적합합니다. 추천 시즌: ${season}.`;
    } catch (e) {
      return dest.note || "현지 정보를 확인해보세요.";
    }
  }

  // 사용자 요청(B): 모든 destinationsData의 note 필드를 영구적으로 1~2문장으로 덮어쓰기
  // generateNoteFor로 생성한 간결한 문장을 각 dest.note에 저장합니다.
  try {
    if (
      typeof destinationsData !== "undefined" &&
      Array.isArray(destinationsData)
    ) {
      destinationsData.forEach((d) => {
        d.note = generateNoteFor(d);
      });
    }
  } catch (e) {
    // 안전하게 실패 무시: 기존 note는 그대로 유지됩니다.
    console.warn("note 자동 갱신 중 오류:", e);
  }

  // 현재 화면 뷰 상태 (intro/guide)
  let currentView = "intro";
  // destinationsData: runtime-populated from data/destinations.json
  var destinationsData = window.destinationsData || [];
  // 현재 사용자 ID
  let currentUserId = null;
  // 알림 타임아웃 핸들러
  let notificationTimeout = null;
  // 선택된 필터 값들
  let selectedMonth = 0;
  let selectedContinent = "모두";
  let selectedBudget = "모두";
  let selectedPurpose = "모두";
  let selectedFlightTime = "모두";
  // 전체검색 쿼리
  let searchQuery = "";
  let isFiltered = false;

  // 여행지 상세 정보 모달을 띄우는 함수
  function showMapModal(dest) {
    // 여행지별 일정 정보 가져오기
    // 우선적으로 런타임에 로드된 `window.tripDurations` (data/itineraries.json)를 사용
    const tripInfo = (window.tripDurations &&
      window.tripDurations[dest.name]) ||
      tripDurations[dest.name] || {
        days: "5박7일",
        itinerary: ["정보 준비중입니다"],
      };

    // 국가별 검색어 최적화 (중복 지명 회피)
    const mapSearchQueries = {
      피지: "Fiji Islands country",
      뉴질랜드: "New Zealand country",
      아르헨티나: "Argentina country",
      브라질: "Brazil country",
      칠레: "Chile country",
      뉴칼레도니아: "New Caledonia country",
      바누아투: "Vanuatu country",
      사모아: "Samoa country",
    };

    // 지도의 정확도를 높이기 위해 좌표(lat/lng)가 있으면 좌표 사용,
    // 지도의 정확도를 높이기 위해 우선 좌표(lat/lng)가 있으면 좌표 사용,
    // 좌표가 없으면 다음 규칙을 따릅니다:
    // - 목적지 이름이 '국가 그 자체'(예: name === country) 이면 그 국가의 수도를 찾아서 표시
    // - 그렇지 않으면 목적지(지역/도시)명을 표시
    // 오세아니아의 지역 검색은 'Pacific Islands' 컨텍스트를 더해 정확도를 높입니다.
    const countryCapitals = {
      인도네시아: "Jakarta",
      몰디브: "Malé",
      태국: "Bangkok",
      베트남: "Hanoi",
      일본: "Tokyo",
      중국: "Beijing",
      미국: "Washington, D.C.",
      캐나다: "Ottawa",
      호주: "Canberra",
      뉴질랜드: "Wellington",
      프랑스: "Paris",
      이탈리아: "Rome",
      스페인: "Madrid",
      포르투갈: "Lisbon",
      독일: "Berlin",
      영국: "London",
      네덜란드: "Amsterdam",
      스위스: "Bern",
      스웨덴: "Stockholm",
      노르웨이: "Oslo",
      핀란드: "Helsinki",
      그리스: "Athens",
      멕시코: "Mexico City",
      브라질: "Brasília",
      아르헨티나: "Buenos Aires",
      페루: "Lima",
      칠레: "Santiago",
      남아프리카: "Pretoria",
      이집트: "Cairo",
      모로코: "Rabat",
      케냐: "Nairobi",
      탄자니아: "Dodoma",
      말레이시아: "Kuala Lumpur",
      필리핀: "Manila",
      싱가포르: "Singapore",
      아랍에미리트: "Abu Dhabi",
      튀르키예: "Ankara",
      포르투갈: "Lisbon",
      피지: "Suva",
      뉴칼레도니아: "Nouméa",
      바누아투: "Port Vila",
      사모아: "Apia",
      "프렌치 폴리네시아": "Papeete",
    };

    let mapQuery;
    let zoom = 10;
    // 좌표 우선
    if (dest.lat && dest.lng) {
      mapQuery = `${dest.lat},${dest.lng}`;
      // 섬 지역은 조금 더 넓게 보여주기
      zoom = dest.continent === "오세아니아" ? 6 : 10;
    } else {
      const nameNormalized = (dest.name || "").trim().toLowerCase();
      const countryNormalized = (dest.country || "").trim().toLowerCase();
      const isCountryItself = nameNormalized === countryNormalized;

      if (isCountryItself) {
        // 국가 그 자체일 때는 수도 검색(매핑이 없으면 'capital of X'로 대체)
        const capital = countryCapitals[dest.country];
        mapQuery = capital
          ? `${capital}, ${dest.country}`
          : `capital of ${dest.country}`;
        zoom = dest.continent === "오세아니아" ? 6 : 6;
      } else {
        // 지역/도시일 때는 목적지 이름 우선
        mapQuery = `${dest.name}${dest.country ? `, ${dest.country}` : ""}`;
        if (dest.continent === "오세아니아") mapQuery += " Pacific Islands";
        zoom = dest.continent === "오세아니아" ? 5 : 11;
      }
      // 추가: mapSearchQueries에 명시된 특수 케이스를 우선 사용
      if (!dest.lat && mapSearchQueries[dest.country]) {
        mapQuery = mapSearchQueries[dest.country];
      }
    }

    // 모달 생성 및 내용 삽입
    const modal = document.createElement("div");
    modal.className = "modal active";
    // 모달 구조를 header / body / footer로 나눠서 body만 스크롤되게 만듭니다.
    modal.innerHTML = `
    <div class="modal-content" style="max-width: 1000px;">
      <div class="modal-header border-b px-4 py-3 flex items-center justify-between">
        <div class="modal-title"></div>
        <button onclick="closeModal()" aria-label="닫기" class="text-gray-600 hover:text-gray-800 focus:ring-2 focus:ring-primary rounded" tabindex="0">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="map-container">
          <iframe width="100%" height="100%" frameborder="0" style="border:0"
            src="https://www.google.com/maps/embed/v1/place?key=AIzaSyBFw0Qbyq9zTFTd-tUY6dZWTgaQzuU17R8&q=${encodeURIComponent(
              mapQuery,
            )}&zoom=${zoom}"
            allowfullscreen></iframe>
        </div>
        <div class="p-6">
          <h3 class="text-2xl font-bold mb-4" style="color: ${
            colors.primary
          }">${dest.name}, ${dest.country}</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div class="flex items-center">
              <i data-lucide="plane" class="w-5 h-5 mr-2" style="color: ${
                colors.accent
              };"></i>
              <p class="text-base"><strong>비행시간:</strong> <span style="color: ${
                colors.primary
              };">${flightTimes[dest.country] || "정보 없음"}</span></p>
            </div>
            <div class="flex items-center">
              <i data-lucide="calendar" class="w-5 h-5 mr-2" style="color: ${
                colors.info
              };"></i>
              <p class="text-base"><strong>평균 일정:</strong> <span style="color: ${
                colors.primary
              };">${tripInfo.days}</span></p>
            </div>
          </div>
    <p class="text-gray-600 mb-4">${generateNoteFor(dest)}</p>
          <div class="bg-gray-50 rounded-xl p-4 mb-4">
            <h4 class="text-lg font-bold mb-3 flex items-center" style="color: ${
              colors.primary
            };">
              <i data-lucide="map" class="w-5 h-5 mr-2"></i>
              추천 신혼여행 코스
            </h4>
            <div class="space-y-2">
              ${tripInfo.itinerary
                .map(
                  (item, idx) => `
                  <div class="flex items-start">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold mr-3" style="background-color: ${
                      colors.primary
                    };">
                      ${idx + 1}
                    </div>
                    <p class="text-sm text-gray-700 pt-1">${item}</p>
                  </div>
              `,
                )
                .join("")}
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button onclick="closeModal()" class="w-full bg-primary text-white font-bold py-3 px-6 rounded-xl hover:opacity-90 transition" style="background-color: ${
          colors.primary
        };">닫기</button>
      </div>
    </div>
  `;
    document.body.appendChild(modal);
    modal.onclick = (e) => {
      if (e.target === modal) closeModal();
    };
    if (typeof lucide !== "undefined" && lucide.createIcons)
      lucide.createIcons();
  }

  // 모달 닫기 함수
  window.closeModal = function () {
    const modal = document.querySelector(".modal");
    if (modal) modal.remove();
    // 모달이 닫힐 때 바디 스크롤 복원 로직 제거 (스크롤 잠금 미사용)
  };

  // 추천 여행템(패킹 리스트) 생성기: 목적지 특성에 따라 기본 추천 아이템을 반환
  function getPackingItemsFor(dest) {
    const items = [];
    const name = (dest.name || "").toLowerCase();
    const vibe = (dest.vibe || "").toLowerCase();
    const travelType = (dest.travelType || "").toLowerCase();

    // 목적지별 하드코드된 추천(몇몇 인기 목적지)
    const specific = {
      발리: ["썬크림(SPF50+)", "비치웨어(래쉬가드)", "방수 파우치"],
      몰디브: [
        "리조트용 드레스/셔츠",
        "스노클링 마스크(현지 대여 가능)",
        "썬크림",
      ],
      파리: ["편한 워킹 슈즈", "카메라(미러리스)", "얇은 트렌치 코트"],
      하와이: ["수영복", "선글라스", "비치 샌들"],
    };
    if (specific[dest.name]) {
      items.push(...specific[dest.name]);
    }

    // 분위기/타입 기반 추천
    if (vibe.includes("해변") || travelType.includes("휴양")) {
      items.push("썬크림", "모자", "비치 타월");
    }
    if (
      vibe.includes("하이킹") ||
      travelType.includes("액티비티") ||
      name.includes("트레킹")
    ) {
      items.push("트레킹화", "방수 재킷", "물병(보온/보냉)");
    }
    if (vibe.includes("도시") || travelType.includes("관광")) {
      items.push("편한 워킹 슈즈", "휴대용 보조배터리", "소형 우산");
    }

    // 중복 제거, 상위 12개로 제한
    const uniq = [...new Set(items)].slice(0, 12);
    // 맵핑된 URL(샘플 검색 링크) 생성 및 기본 이미지/설명 포함
    return uniq.map((title) => ({
      title,
      desc: `${title}는 ${dest.name} 여행에 유용한 아이템입니다. 상세 구매 페이지에서 옵션을 확인하세요.`,
      img: `https://via.placeholder.com/160?text=${encodeURIComponent(title)}`,
      url: `https://www.example.com/search?q=${encodeURIComponent(
        dest.name + " " + title,
      )}`,
    }));
  }

  // 추천 여행템 전용 모달 표시: 카드의 버튼에서 호출
  function showPackingModal(dest) {
    try {
      const items = getPackingItemsFor(dest);
      const modal = document.createElement("div");
      modal.className = "modal active";
      modal.innerHTML = `
        <div class="modal-content" style="max-width:700px;">
          <div class="modal-header border-b px-4 py-3 flex items-center justify-between">
            <div class="modal-title"><h3 class="text-xl font-bold" style="color: ${
              colors.primary
            };">${dest.name} 추천 여행템</h3></div>
            <button onclick="closeModal()" aria-label="닫기" class="text-gray-600 hover:text-gray-800 focus:ring-2 focus:ring-primary rounded" tabindex="0">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
          <div class="modal-body p-6">
            <p class="text-sm text-gray-600 mb-4">여행지 특성에 맞춘 추천 아이템입니다. 클릭하면 구매 페이지로 이동합니다.</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${items
                .map(
                  (it) => `
                <a href="${it.url}" target="_blank" rel="noopener noreferrer" class="packing-item">
                  <img src="${it.img}" alt="${it.title}" loading="lazy">
                  <div>
                    <div class="item-title">${it.title}</div>
                    <div class="item-desc">${it.desc}</div>
                    <div class="text-xs text-gray-400 mt-2">구매/상세보기</div>
                  </div>
                </a>
              `,
                )
                .join("")}
            </div>
          </div>
          <div class="modal-footer">
            <button onclick="closeModal()" class="w-full bg-primary text-white font-bold py-3 px-6 rounded-xl hover:opacity-90 transition" style="background-color: ${
              colors.primary
            };">닫기</button>
          </div>
        </div>
        `;
      document.body.appendChild(modal);
      modal.onclick = (e) => {
        if (e.target === modal) closeModal();
      };
      if (typeof lucide !== "undefined" && lucide.createIcons)
        lucide.createIcons();
    } catch (e) {
      console.error("추천 여행템 모달 생성 오류:", e);
    }
  }

  // ESC 키로 모달 닫기 이벤트
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      closeModal();

  });

  // 여행지 추천/필터링 페이지 렌더링 함수
  function renderGuidePage() {
    // 여행지 필터링 및 정렬 함수
    const filterAndSortDestinations = () => {
      if (!isFiltered) return destinationsData;
      // If the user clicked '검색' but no filters or query are set,
      // explicitly return the full list to avoid accidental partial results.
      const noFilterSelected =
        selectedMonth === 0 &&
        selectedContinent === "모두" &&
        selectedBudget === "모두" &&
        selectedPurpose === "모두" &&
        selectedFlightTime === "모두" &&
        !(searchQuery || "").trim();
      if (noFilterSelected) return destinationsData;
      let list = destinationsData.filter((dest) => {
        // 달, 대륙, 예산, 목적, 비행시간 필터링
        const monthMatch =
          selectedMonth === 0 ||
          (Array.isArray(dest.bestMonths) &&
            dest.bestMonths.includes(selectedMonth)) ||
          (Array.isArray(dest.goodMonths) &&
            dest.goodMonths.includes(selectedMonth));
        const continentMatch =
          selectedContinent === "모두" || dest.continent === selectedContinent;
        // 예산 카테고리로 비교
        const budgetMatch =
          selectedBudget === "모두" ||
          (selectedBudget && dest.budgetCategory === selectedBudget);
        const purposeMatch =
          selectedPurpose === "모두" ||
          (typeof dest.travelType === "string" &&
            dest.travelType.includes(selectedPurpose));
        // 비행시간 카테고리로 비교
        const flightTimeMatch =
          selectedFlightTime === "모두" ||
          (selectedFlightTime &&
            dest.flightTimeCategory === selectedFlightTime);

        // 전체검색 쿼리 매칭 (이름, 국가, 분위기, 노트)
        const q = (searchQuery || "").trim().toLowerCase();
        const searchMatch =
          !q ||
          [dest.name, dest.country, dest.vibe, dest.note].some(
            (s) => s && s.toString().toLowerCase().includes(q),
          );

        return (
          monthMatch &&
          continentMatch &&
          budgetMatch &&
          purposeMatch &&
          flightTimeMatch &&
          searchMatch
        );
      });
      // BEST 시즌 우선 정렬
      if (selectedMonth !== 0)
        list.sort((a, b) => {
          const isABest = a.bestMonths.includes(selectedMonth);
          const isBBest = b.bestMonths.includes(selectedMonth);
          return isABest && !isBBest
            ? -1
            : !isABest && isBBest
              ? 1
              : a.name.localeCompare(b.name, "ko");
        });
      return list;

      ? `<div class="col-span-full text-center text-gray-500 p-12 bg-white rounded-2xl shadow-inner border-dashed border-2 border-gray-200"><i data-lucide="globe" class='w-12 h-12 mx-auto mb-4' style='color: ${colors.info};'></i><p class="text-xl font-semibold mb-2" style="color: ${colors.text};">필터를 선택하고 '여행지 검색' 버튼을 눌러보세요!</p><p class="text-gray-500">두 분이 꿈꾸는 완벽한 여행지를 찾아드립니다 ✨</p></div>`

    return `<div id="filter-bar" class="bg-white p-6 rounded-2xl shadow-xl mb-10 flex flex-col gap-4 border-b-4" style="border-color: ${
      colors.primary
    }AA;">
              <div class="w-full flex flex-col lg:flex-row gap-4 items-stretch lg:items-center justify-between">

                    colors.primary
                  }55; background-color: ${colors.secondary};">
                      <option value="0">-- 모든 달 📅 --</option>${[

                        .join("")}
                  </select>
              </div>
              <div class="w-full lg:w-auto flex-grow"><label for="continent-select" class="block text-sm font-bold text-gray-700 mb-1" style="color: ${
                colors.text
              };">대륙</label>
                  <select id="continent-select" class="w-full lg:w-45 custom-arrow border-2 rounded-xl p-3 transition duration-150 ease-in-out bg-secondary text-gray-800 shadow-sm focus:ring-2 focus:ring-accent" style="border-color: ${
                    colors.primary
                  }55; background-color: ${colors.secondary};">
                      <option value="모두">-- 모든 대륙 🌎 --</option>${[
                        "아시아",
                        "오세아니아",
                        "유럽",
                        "미주",
                        "아프리카",
                      ]
                        .map(
                          (c) =>
                            `<option value="${c}" ${
                              selectedContinent === c ? "selected" : ""
                            }>${c}</option>`,
                        )
                        .join("")}
                  </select>
              </div>
              <div class="w-full lg:w-auto flex-grow"><label for="budget-select" class="block text-sm font-bold text-gray-700 mb-1" style="color: ${
                colors.text
              };">예산대</label>
                  <select id="budget-select" class="w-full lg:w-45 custom-arrow border-2 rounded-xl p-3 transition duration-150 ease-in-out bg-secondary text-gray-800 shadow-sm focus:ring-2 focus:ring-accent" style="border-color: ${

                      <option value="모두">-- 모든 예산 💰 --</option>${[

                        "매우 높음",
                      ]

                        )
                        .join("")}
                  </select>

              <div class="w-full lg:w-auto flex-grow"><label for="purpose-select" class="block text-sm font-bold text-gray-700 mb-1" style="color: ${

              };">여행 목적</label>

                    colors.primary
                  }55; background-color: ${colors.secondary};">
                      <option value="모두">-- 모든 목적 🎯 --</option>${[
                        "휴양",
                        "관광",
                        "액티비티",
                      ]
                        .map(
                          (p) =>
                            `<option value="${p}" ${
                              selectedPurpose === p ? "selected" : ""
                            }>${p}</option>`,
                        )
                        .join("")}
                  </select>
              </div>
              <div class="w-full lg:w-auto flex-grow"><label for="flighttime-select" class="block text-sm font-bold text-gray-700 mb-1" style="color: ${
                colors.text
              };">비행시간</label>
                  <select id="flighttime-select" class="w-full lg:w-45 custom-arrow border-2 rounded-xl p-3 transition duration-150 ease-in-out bg-secondary text-gray-800 shadow-sm focus:ring-2 focus:ring-accent" style="border-color: ${
                    colors.primary
                  }55; background-color: ${colors.secondary};">
                      <option value="모두">-- 모든 거리 ✈️ --</option>${[
                        "단거리",
                        "중거리",
                        "장거리",
                        "울트라 장거리",
                      ]
                        .map(
                          (f) =>
                            `<option value="${f}" ${
                              selectedFlightTime === f ? "selected" : ""
                            }>${f}</option>`,
                        )
                        .join("")}
                  </select>
              </div>
              </div>
              <div class="w-full flex justify-end gap-3">
              <button id="reset-button" class="w-full md:w-auto bg-white text-primary font-bold text-lg py-3 px-6 rounded-xl shadow-sm border-2" style="border-color: ${colors.primary}55; color: ${colors.primary};">
                  초기화
              </button>
              <button id="search-button" class="w-full md:w-auto text-white font-black text-lg py-3 px-8 rounded-xl shadow-xl hover:opacity-95 transition duration-200 ease-in-out flex items-center justify-center transform active:scale-95" style="background-color: ${
                colors.primary
              };">
                  <i data-lucide="search" class="w-5 h-5 mr-3"></i> 여행지 검색
              </button>
              </div>
          </div>
          <div id="destinations-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">${content}</div>`;
  }

  // 여행지 검색 버튼 클릭 시 필터 적용 함수
  function handleSearch() {
    const searchInput = document.getElementById("search-input");
    if (searchInput) searchQuery = searchInput.value || "";
    isFiltered = true;
    renderApp();
  }

  // 필터/검색 초기화 함수: UI와 상태를 기본값으로 되돌리고 전체 결과를 표시
  function handleReset() {
    selectedMonth = 0;
    selectedContinent = "모두";
    selectedBudget = "모두";
    selectedPurpose = "모두";
    selectedFlightTime = "모두";
    searchQuery = "";
    // reflect in DOM
    const si = document.getElementById("search-input");
    if (si) si.value = "";
    const m = document.getElementById("month-select");
    if (m) m.value = "0";
    const c = document.getElementById("continent-select");
    if (c) c.value = "모두";
    const b = document.getElementById("budget-select");
    if (b) b.value = "모두";
    const p = document.getElementById("purpose-select");
    if (p) p.value = "모두";
    const f = document.getElementById("flighttime-select");
    if (f) f.value = "모두";
    // mark as filtered so filterAndSortDestinations will detect empty filters and return all
    isFiltered = true;
    renderApp();
  }
  // 필터 값 변경 시 처리 함수
  function handleFilterChange(e) {
    const target = e.target;
    if (target.id === "month-select") selectedMonth = parseInt(target.value);
    else if (target.id === "continent-select") selectedContinent = target.value;
    else if (target.id === "budget-select") selectedBudget = target.value;
    else if (target.id === "purpose-select") selectedPurpose = target.value;
    else if (target.id === "flighttime-select")
      selectedFlightTime = target.value;
    // Apply filters immediately on change
    isFiltered = true;
    renderApp();
  }

  // 암호 입력 모달 표시 함수
  function showPasswordModal() {
    // Password step removed — directly navigate to guide page
    setView("guide");
  }

  // 암호 확인 함수
  window.checkPassword = function () {
    // Deprecated — direct navigation to guide
    setView("guide");
  };

  // 주요 버튼 및 필터 이벤트 리스너 등록 함수
  function attachEventListeners() {
    // 헤더 타이틀 클릭 시 인트로 화면으로 이동
    const headerTitle = document.getElementById("header-title");
    if (headerTitle) headerTitle.onclick = () => setView("intro");
    // 시작 버튼 클릭 시 암호 입력 모달 표시
    const startButton = document.getElementById("start-button");
    if (startButton) startButton.onclick = () => setView("guide");
    // 여행지 검색 버튼 및 필터 셀렉트 박스 이벤트 등록
    const searchButton = document.getElementById("search-button");
    if (searchButton) {
      searchButton.onclick = handleSearch;
      const resetButton = document.getElementById("reset-button");
      if (resetButton) resetButton.onclick = handleReset;
      const monthSelect = document.getElementById("month-select");
      const continentSelect = document.getElementById("continent-select");
      const budgetSelect = document.getElementById("budget-select");
      const purposeSelect = document.getElementById("purpose-select");
      const flighttimeSelect = document.getElementById("flighttime-select");
      if (monthSelect) monthSelect.onchange = handleFilterChange;
      if (continentSelect) continentSelect.onchange = handleFilterChange;
      if (budgetSelect) budgetSelect.onchange = handleFilterChange;
      if (purposeSelect) purposeSelect.onchange = handleFilterChange;
      if (flighttimeSelect) flighttimeSelect.onchange = handleFilterChange;
      const searchInput = document.getElementById("search-input");
      if (searchInput) {
        // 입력 시에는 검색어만 업데이트합니다. 실제 필터링은 버튼 클릭 시 수행됩니다.
        searchInput.oninput = (e) => {
          searchQuery = e.target.value || "";
        };
        // Enter 키로도 검색 버튼이 작동하도록 처리
        searchInput.onkeydown = (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            // 최신 입력값을 반영하고 검색 실행
            searchQuery = e.target.value || "";
            handleSearch();
          }
        };
      }
    }
  }

  // 페이지 로드 시 초기화 및 앱 렌더링
  function startApp() {
    currentUserId = "user-" + Math.random().toString(36).substr(2, 9);
    renderApp();
  }

  window.onload = () => {
    // Start only when itineraries, destinations and flight-times JSON have been loaded
    if (
      window.__itineraries_loaded &&
      window.__destinations_loaded &&
      window.__flighttimes_loaded
    ) {
      // compute derived fields once all JSON resources are ready
      if (typeof computeDerivedData === "function") computeDerivedData();
      startApp();
      return;
    }

    const onAllLoaded = () => {
      if (
        window.__itineraries_loaded &&
        window.__destinations_loaded &&
        window.__flighttimes_loaded
      ) {
        window.removeEventListener("itineraries:loaded", onAllLoaded);
        window.removeEventListener("destinations:loaded", onAllLoaded);
        window.removeEventListener("flighttimes:loaded", onAllLoaded);
        if (typeof computeDerivedData === "function") computeDerivedData();
        startApp();
      }
    };
    window.addEventListener("itineraries:loaded", onAllLoaded);
    window.addEventListener("destinations:loaded", onAllLoaded);
    window.addEventListener("flighttimes:loaded", onAllLoaded);
  };
</script>
